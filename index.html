<!DOCTYPE html>
<html lang="ua">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>Список завдань</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="task-list-container">
    <div class="task-list-header">
      <h1 class="task-list-title">Список завдань</h1>
    </div>
    <div class="task-input">
     <input type="text" id="task-input" placeholder="Введіть нове завдання" maxlength="100">
     <button type="submit" id="add-btn" title="Додати завдання">Додати</button>
    </div>
    <fieldset class="tasks-list" id="task-list">
      <label class="tasks-list-item">
        <input type="checkbox" name="task_1" class="tasks-list-cb" checked>
        <span class="tasks-list-mark"></span>
        <span class="tasks-list-desc">Опанувати HTML та CSS</span>
      </label>
      <label class="tasks-list-item">
        <input type="checkbox" name="task_2" class="tasks-list-cb" checked>
        <span class="tasks-list-mark"></span>
        <span class="tasks-list-desc">Опанувати Git та GitHub</span>
      </label>
      <label class="tasks-list-item">
        <input type="checkbox" name="task_3" class="tasks-list-cb">
        <span class="tasks-list-mark"></span>
        <span class="tasks-list-desc">Опанувати JavaScript</span>
      </label>
      <label class="tasks-list-item">
        <input type="checkbox" name="task_4" class="tasks-list-cb">
        <span class="tasks-list-mark"></span>
        <span class="tasks-list-desc">Опанувати Node.js</span>
      </label>
    </fieldset>
  </div>
</body>
</html>
